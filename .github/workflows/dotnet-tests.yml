name: .NET Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Check out the code from GitHub
      - uses: actions/checkout@v3

      # 2️⃣ Set up .NET SDK 7.x
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      # 3️⃣ Restore dependencies for the test project (which references the library)
      - name: Restore dependencies
        run: dotnet restore ./SoftwareQualityTests/SoftwareQualityTests.csproj

      # 4️⃣ Build the test project (and library automatically via ProjectReference)
      - name: Build solution
        run: dotnet build ./SoftwareQualityTests/SoftwareQualityTests.csproj --no-restore

      # 5️⃣ Run all tests, including MC/DC tests in SearchTests.cs
      - name: Run tests
        run: dotnet test ./SoftwareQualityTests/SoftwareQualityTests.csproj --no-build