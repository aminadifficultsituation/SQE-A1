name: .NET Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore ./SoftwareQualityTests.csproj

      - name: Build solution
        run: dotnet build ./SoftwareQualityTests.csproj --no-restore

      - name: Run tests
        run: dotnet test ./SoftwareQualityTests.csproj --no-build